name: Build WPF v2

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-wpf-v2:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.12.1'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: v2/workspace-ui/pnpm-lock.yaml

      - name: Install Workspace frontend
        run: pnpm --dir .\v2\workspace-ui install --frozen-lockfile

      - name: Build Workspace static export
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: pnpm --dir .\v2\workspace-ui build

      - name: Verify Workspace static export
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath '.\v2\workspace-ui\out\index.html')) {
            throw "Workspace static export is missing index.html."
          }

      - name: Restore WPF v2
        run: dotnet restore .\v2\TaskOverlay.sln --configfile .\v2\NuGet.Config

      - name: Build WPF v2
        run: dotnet build .\v2\TaskOverlay.sln --configuration Release --no-restore

      - name: Publish WPF v2 framework-dependent
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP 'TaskOverlayV2_WPF_FrameworkDependent'
          dotnet publish .\v2\src\TaskOverlay.App\TaskOverlay.App.csproj --configuration Release --no-build --self-contained false --output $publishDir

      - name: Verify WPF v2 artifact contents
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP 'TaskOverlayV2_WPF_FrameworkDependent'
          $expectedExe = Join-Path $publishDir 'TaskOverlay.V2.exe'
          $legacyExe = Get-ChildItem -LiteralPath $publishDir -Filter 'TaskOverlay.exe' -File -Recurse

          if (-not (Test-Path -LiteralPath $expectedExe)) {
            throw "TaskOverlay.V2.exe is missing from publish output."
          }

          if ($legacyExe) {
            throw "TaskOverlay.exe must not be included in the WPF v2 artifact."
          }

          $workspaceIndex = Join-Path $publishDir 'WorkspaceWeb\index.html'
          if (-not (Test-Path -LiteralPath $workspaceIndex)) {
            throw "WorkspaceWeb/index.html is missing from publish output."
          }

      - name: Upload WPF v2 framework-dependent artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskOverlayV2_WPF_FrameworkDependent
          path: ${{ runner.temp }}\TaskOverlayV2_WPF_FrameworkDependent\
