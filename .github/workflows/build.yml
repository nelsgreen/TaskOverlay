name: Build Go v1 portable

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Build portable ZIP
        shell: pwsh
        run: ./build/build_windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskOverlay_GoV1_Portable
          path: build/dist/TaskOverlay_portable.zip
