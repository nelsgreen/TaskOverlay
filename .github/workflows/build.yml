name: Build TaskOverlay

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-taskoverlay:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.12.1'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: workspace-ui/pnpm-lock.yaml

      - name: Install and build Workspace
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          pnpm --dir .\workspace-ui install --frozen-lockfile
          pnpm --dir .\workspace-ui build
          if (-not (Test-Path -LiteralPath '.\workspace-ui\out\index.html')) { throw 'Workspace static export is missing index.html.' }

      - name: Restore and build
        run: |
          dotnet restore .\TaskOverlay.sln --configfile .\NuGet.Config
          dotnet build .\TaskOverlay.sln --configuration Release --no-restore

      - name: Test
        run: |
          dotnet run --project .\tests\TaskOverlay.Core.Tests\TaskOverlay.Core.Tests.csproj --configuration Release --no-build
          dotnet run --project .\tests\TaskOverlay.App.Tests\TaskOverlay.App.Tests.csproj --configuration Release --no-build

      - name: Publish portable package
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $env:RUNNER_TEMP 'TaskOverlay_Windows_Portable'
          $packageRoot = Join-Path $artifactRoot 'TaskOverlay'
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          dotnet publish .\src\TaskOverlay.App\TaskOverlay.App.csproj --configuration Release --no-build --self-contained false -r win-x64 --output $packageRoot
          Get-ChildItem -LiteralPath $packageRoot -File -Recurse |
            Where-Object { $_.Extension -in @('.pdb', '.xml') } |
            Remove-Item -Force
          @(
            'TaskOverlay portable'
            ''
            'Run TaskOverlay.exe.'
            'Windows 10/11 and .NET Desktop Runtime 8 are required.'
            'The Microsoft Edge WebView2 Runtime is required for Workspace.'
            'No installer is required.'
            'Local state remains under %APPDATA%\TaskOverlayV2.'
          ) | Set-Content -LiteralPath (Join-Path $packageRoot 'README.txt') -Encoding utf8
          $unexpectedRootFiles = Get-ChildItem -LiteralPath $packageRoot -File | Where-Object { $_.Name -notin @('TaskOverlay.exe', 'README.txt') }
          if ($unexpectedRootFiles) { throw "Unexpected package root files: $($unexpectedRootFiles.Name -join ', ')" }
          if (-not (Test-Path -LiteralPath (Join-Path $packageRoot 'TaskOverlay.exe'))) { throw 'TaskOverlay.exe is missing.' }
          if (-not (Test-Path -LiteralPath (Join-Path $packageRoot 'resources\WorkspaceWeb\index.html'))) { throw 'resources/WorkspaceWeb/index.html is missing.' }
          if (Test-Path -LiteralPath (Join-Path $packageRoot 'runtimes')) { throw 'runtimes folder must be bundled into the single-file executable.' }
          if (Get-ChildItem -LiteralPath $packageRoot -File -Recurse | Where-Object { $_.Extension -in @('.pdb', '.xml') }) { throw 'Development PDB or XML files remain in the package.' }
          Compress-Archive -LiteralPath $packageRoot -DestinationPath (Join-Path $artifactRoot 'TaskOverlay_Windows_Portable.zip') -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskOverlay_Windows_Portable
          path: ${{ runner.temp }}\TaskOverlay_Windows_Portable\TaskOverlay_Windows_Portable.zip
