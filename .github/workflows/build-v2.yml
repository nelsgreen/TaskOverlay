name: Build Windows WPF v2 prototype

on:
  push:
    paths:
      - "v2/**"
      - "docs/V2_ARCHITECTURE.md"
      - ".github/workflows/build-v2.yml"
  pull_request:
    paths:
      - "v2/**"
      - "docs/V2_ARCHITECTURE.md"
      - ".github/workflows/build-v2.yml"
  workflow_dispatch:

jobs:
  build-v2:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore v2/TaskOverlay.sln --configfile v2/NuGet.Config

      - name: Build
        run: dotnet build v2/TaskOverlay.sln --configuration Release --no-restore

      - name: Test storage
        run: dotnet run --project v2/tests/TaskOverlay.Core.Tests/TaskOverlay.Core.Tests.csproj --configuration Release --no-build

      - name: Publish framework-dependent app
        run: dotnet publish v2/src/TaskOverlay.App/TaskOverlay.App.csproj --configuration Release --no-restore --output v2/publish/framework-dependent

      - name: Publish self-contained app
        run: dotnet publish v2/src/TaskOverlay.App/TaskOverlay.App.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --source https://api.nuget.org/v3/index.json --output v2/publish/self-contained

      - name: Upload framework-dependent Windows app
        uses: actions/upload-artifact@v4
        with:
          name: TaskOverlayV2_WPF_FrameworkDependent
          path: v2/publish/framework-dependent
          if-no-files-found: error

      - name: Upload self-contained Windows app
        uses: actions/upload-artifact@v4
        with:
          name: TaskOverlayV2_WPF_SelfContained
          path: v2/publish/self-contained
          if-no-files-found: error
